<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>شات بوت AI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-container {
      width: 95%;
      max-width: 600px;
      height: 90vh;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 20px;
      background: linear-gradient(90deg, #6d28d9, #2563eb);
      text-align: center;
      color: white;
    }
    .chat-header h1 { font-size: 1.3rem; }
    .chat-header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .user-message {
      background: linear-gradient(90deg, #6d28d9, #2563eb);
      color: white;
      align-self: flex-end;
      border-bottom-left-radius: 4px;
    }
    .bot-message {
      background: rgba(255,255,255,0.1);
      color: white;
      align-self: flex-start;
      border-bottom-right-radius: 4px;
    }
    .typing {
      color: rgba(255,255,255,0.5);
      font-style: italic;
      font-size: 0.85rem;
      align-self: flex-start;
      padding: 8px 16px;
    }
    .chat-input {
      padding: 16px;
      background: rgba(0,0,0,0.2);
      display: flex;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }
    .chat-input input::placeholder { color: rgba(255,255,255,0.4); }
    .chat-input button {
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #6d28d9, #2563eb);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .chat-input button:hover { opacity: 0.9; }
    .welcome {
      text-align: center;
      color: rgba(255,255,255,0.4);
      margin: auto;
      padding: 20px;
    }
    .welcome .icon { font-size: 3rem; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h1>🤖 مساعد الذكاء الاصطناعي</h1>
    <p>اسألني أي شيء وسأساعدك!</p>
  </div>
  <div class="chat-messages" id="messages">
    <div class="welcome">
      <div class="icon">💬</div>
      <p>ابدأ المحادثة الآن</p>
    </div>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKey(event)"/>
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;

  const messages = document.getElementById('messages');

  // Remove welcome
  const welcome = messages.querySelector('.welcome');
  if (welcome) welcome.remove();

  // Add user message
  messages.innerHTML += `<div class="message user-message">${msg}</div>`;
  input.value = '';

  // Add typing
  messages.innerHTML += `<div class="typing" id="typing">⏳ جاري الرد...</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    messages.innerHTML += `<div class="message bot-message">🤖 ${data.reply}</div>`;
  } catch {
    document.getElementById('typing')?.remove();
    messages.innerHTML += `<div class="message bot-message">❌ حدث خطأ، حاول مرة أخرى.</div>`;
  }
  messages.scrollTop = messages.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}
</script>
</body>
</html>
