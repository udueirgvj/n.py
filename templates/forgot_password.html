<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>نسيت كلمة المرور - Clipn</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Tajawal',sans-serif;background:#0a0a0f;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.card{background:#12121a;border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:28px;width:100%;max-width:400px;}.input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(124,58,237,0.2);background:#1a1a26;color:#f1f5f9;font-family:'Tajawal',sans-serif;font-size:0.95rem;outline:none;margin-bottom:12px;}.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}.msg{padding:12px;border-radius:10px;margin-bottom:14px;font-size:0.9rem;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac;}</style>
</head><body>
<div class="card">
  <h2 style="margin-bottom:20px;text-align:center;">🔑 نسيت كلمة المرور</h2>
  {% if msg %}<div class="msg">{{msg}}</div>{% endif %}
  <form method="POST">
    <input name="email" type="email" class="input" placeholder="البريد الإلكتروني" required/>
    <button type="submit" class="btn">إرسال</button>
  </form>
  <div style="text-align:center;margin-top:14px;"><a href="/login" style="color:#a855f7;font-size:0.9rem;">العودة لتسجيل الدخول</a></div>
</div>
</body></html>
