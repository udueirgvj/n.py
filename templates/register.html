<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clipn - إنشاء حساب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#0a0a0f;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:24px;}
.logo h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:#12121a;border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:24px;}
.input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(124,58,237,0.2);background:#1a1a26;color:#f1f5f9;font-family:'Tajawal',sans-serif;font-size:0.95rem;outline:none;margin-bottom:10px;}
.input:focus{border-color:#7c3aed;}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px;}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:0.88rem;}
.link{text-align:center;margin-top:14px;color:#94a3b8;font-size:0.9rem;}
.link a{color:#a855f7;}
.step{display:none;}
.step.active{display:block;}
.dob-row{display:flex;gap:8px;}
.dob-row select{flex:1;padding:12px 8px;border-radius:12px;border:1px solid rgba(124,58,237,0.2);background:#1a1a26;color:#f1f5f9;font-family:'Tajawal',sans-serif;font-size:0.9rem;outline:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Clipn</h1>
    <p>أنشئ حسابك الآن</p>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{error}}</div>{% endif %}
    <form method="POST" id="reg-form">
      <!-- Step 1 -->
      <div class="step active" id="step1">
        <input name="display_name" class="input" placeholder="الاسم الشخصي" required/>
        <input name="username" class="input" placeholder="اسم المستخدم (@)" required/>
        <input name="email" type="email" class="input" placeholder="البريد الإلكتروني" required/>
        <input name="password" type="password" class="input" placeholder="كلمة المرور" required/>
        <button type="button" class="btn" onclick="nextStep()">التالي →</button>
      </div>
      <!-- Step 2: DOB -->
      <div class="step" id="step2">
        <p style="color:#94a3b8;margin-bottom:16px;font-size:0.9rem;">ما هو تاريخ ميلادك؟</p>
        <div class="dob-row">
          <select name="dob_day">
            {% for d in range(1,32) %}<option>{{d}}</option>{% endfor %}
          </select>
          <select name="dob_month">
            {% for m in ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'] %}
            <option>{{m}}</option>{% endfor %}
          </select>
          <select name="dob_year">
            {% for y in range(2010,1940,-1) %}<option>{{y}}</option>{% endfor %}
          </select>
        </div>
        <button type="submit" class="btn" style="margin-top:16px;">إنشاء الحساب 🎉</button>
      </div>
    </form>
  </div>
  <div class="link">لديك حساب؟ <a href="/login">سجّل دخولك</a></div>
</div>
<script>
function nextStep(){
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
}
</script>
</body>
</html>
