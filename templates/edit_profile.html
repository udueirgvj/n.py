{% extends 'base.html' %}
{% block title %}تعديل الملف - واصل{% endblock %}
{% block content %}
<div class="container">
  <div class="card fade-up">
    <h2 style="margin-bottom:20px;" class="glow-text">✏️ تعديل الملف الشخصي</h2>
    <form method="POST" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="color:var(--text2);font-size:0.9rem;margin-bottom:6px;display:block;">إيموجي الأفاتار</label>
        <input name="avatar" class="input" value="{{user.avatar}}" placeholder="مثال: 😎 🦁 🌟"/>
      </div>
      <div>
        <label style="color:var(--text2);font-size:0.9rem;margin-bottom:6px;display:block;">نبذة عنك</label>
        <textarea name="bio" class="input" placeholder="أخبر الناس عن نفسك...">{{user.bio}}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">حفظ التغييرات ✅</button>
    </form>
  </div>
</div>
{% endblock %}
