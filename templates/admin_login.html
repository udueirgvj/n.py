<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دخول الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Tajawal',sans-serif; background:#0a0a0f; color:#f1f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#12121a; border:1px solid rgba(124,58,237,0.2); border-radius:20px; padding:40px; width:100%; max-width:380px; }
.input { width:100%; padding:12px 16px; border-radius:12px; border:1px solid rgba(124,58,237,0.2); background:#1a1a26; color:#f1f5f9; font-family:'Tajawal',sans-serif; font-size:0.95rem; outline:none; margin-bottom:14px; }
.btn { width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,#7c3aed,#a855f7); color:white; font-family:'Tajawal',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; }
.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; padding:10px; border-radius:10px; margin-bottom:14px; font-size:0.9rem; }
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:3rem;">🛡️</div>
    <h1 style="font-size:1.5rem;margin-top:8px;">لوحة الإدارة</h1>
  </div>
  {% if error %}<div class="error">{{error}}</div>{% endif %}
  <form method="POST">
    <input name="password" type="password" class="input" placeholder="كلمة مرور الإدارة" required/>
    <button type="submit" class="btn">دخول 🔐</button>
  </form>
</div>
</body>
</html>
