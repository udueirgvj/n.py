{% extends 'base.html' %}
{% block title %}مركز المساعدة - Clipn{% endblock %}
{% block content %}
<div class="container">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <a href="/settings" style="color:var(--text2);text-decoration:none;font-size:1.3rem;">‹</a>
    <h2 style="font-size:1.1rem;">❓ مركز المساعدة</h2>
  </div>
  <div class="card" style="text-align:center;padding:20px 16px;">
    <div style="font-size:2rem;margin-bottom:8px;">🤝</div>
    <h3 style="margin-bottom:4px;">كيف يمكننا المساعدة؟</h3>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <a href="/help/account-info" style="text-decoration:none;color:var(--text);">
      <div class="settings-row"><div class="settings-row-info"><div class="settings-row-title">📋 معلومات حساب</div></div><span style="color:var(--text2);">›</span></div>
    </a>
    <a href="/help/hacked" style="text-decoration:none;color:var(--text);">
      <div class="settings-row"><div class="settings-row-info"><div class="settings-row-title">⚠️ حسابي مخترق</div></div><span style="color:var(--text2);">›</span></div>
    </a>
    <a href="/forgot-password" style="text-decoration:none;color:var(--text);">
      <div class="settings-row"><div class="settings-row-info"><div class="settings-row-title">🔑 نسيت كلمة المرور</div></div><span style="color:var(--text2);">›</span></div>
    </a>
    <a href="/help/security" style="text-decoration:none;color:var(--text);">
      <div class="settings-row"><div class="settings-row-info"><div class="settings-row-title">🛡️ أمان الحساب</div></div><span style="color:var(--text2);">›</span></div>
    </a>
  </div>
</div>
{% endblock %}
