{% extends 'base.html' %}
{% block title %}تعديل الملف - Clipn{% endblock %}
{% block content %}
<div class="container">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <a href="/settings" style="color:var(--text2);text-decoration:none;font-size:1.3rem;">‹</a>
    <h2 style="font-size:1.1rem;">👤 حسابي</h2>
  </div>
  {% if success %}<div class="alert alert-success">{{success}}</div>{% endif %}
  {% if error %}<div class="alert alert-error">{{error}}</div>{% endif %}

  <div class="card" style="text-align:center;padding:24px;">
    <div class="avatar avatar-xl" style="margin:0 auto 16px;font-size:2.5rem;">{{user.avatar or '😊'}}</div>
    <p style="color:var(--text2);font-size:0.85rem;">اضغط لتغيير الأفاتار</p>
  </div>

  <div class="card">
    <form method="POST" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="color:var(--text2);font-size:0.85rem;margin-bottom:6px;display:block;">الاسم الشخصي</label>
        <input name="display_name" class="input" value="{{user.display_name or user.username}}"/>
      </div>
      <div>
        <label style="color:var(--text2);font-size:0.85rem;margin-bottom:6px;display:block;">اسم المستخدم</label>
        <input name="username_edit" class="input" value="{{user.username}}" placeholder="@username"/>
      </div>
      <div>
        <label style="color:var(--text2);font-size:0.85rem;margin-bottom:6px;display:block;">تاريخ الإنشاء</label>
        <input name="created_display" class="input" value="{{user.created_at[:10]}}" readonly style="opacity:0.6;cursor:not-allowed;"/>
      </div>
      <div>
        <label style="color:var(--text2);font-size:0.85rem;margin-bottom:6px;display:block;">إيموجي الأفاتار</label>
        <input name="avatar" class="input" value="{{user.avatar or '😊'}}" placeholder="😎"/>
      </div>
      <div>
        <label style="color:var(--text2);font-size:0.85rem;margin-bottom:6px;display:block;">نبذة عنك</label>
        <textarea name="bio" class="input">{{user.bio or ''}}</textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="justify-content:center;">حفظ التغييرات ✅</button>
    </form>
  </div>
</div>
{% endblock %}
