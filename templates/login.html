{% extends 'base.html' %}
{% block title %}تسجيل الدخول - واصل{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card fade-up" style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:3rem;margin-bottom:8px;">🌐</div>
      <h1 class="glow-text" style="font-size:2rem;">واصل</h1>
      <p style="color:var(--text2);margin-top:4px;">تواصل مع العالم</p>
    </div>
    {% if error %}<div class="alert alert-error">{{error}}</div>{% endif %}
    <form method="POST" style="display:flex;flex-direction:column;gap:14px;">
      <input name="username" class="input" placeholder="اسم المستخدم" required/>
      <input name="password" type="password" class="input" placeholder="كلمة المرور" required/>
      <button type="submit" class="btn btn-primary" style="justify-content:center;padding:14px;">دخول 🚀</button>
    </form>
    <div style="text-align:center;margin-top:16px;color:var(--text2);font-size:0.9rem;">
      ليس لديك حساب؟ <a href="/register" style="color:var(--accent2);">سجّل الآن</a>
    </div>
  </div>
</div>
{% endblock %}
